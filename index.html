<style>
:root {
  --bg-primary: #FFFEF9;

.dark {

  --bg-secondary: #161616;
  --text-primary: #e8e6e3;
  --text-secondary: #9a9a9a;

  --link: #6ba3d6;
  --border: #2a2a2a;
}

* { scrollbar-width: thin; scrollbar-color: var(--text-secondary) transparent; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Crimson Pro', Georgia, serif;

  transition: background-color 0.4s ease, color 0.4s ease;

}

/* LaTeX-style Typography */
.latex-title { font-size: 2.5rem; font-weight: 400; letter-spacing: -0.02em; line-height: 1.2; }
.latex-section { font-size: 1.5rem; font-weight: 600; margin-top: 2rem; margin-bottom: 1rem; padding-bottom: 0.3rem; border-bottom: 1px solid var(--border); }
.latex-link { color: var(--link); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.2s ease; cursor: pointer; }
.latex-link:hover { border-bottom-color: var(--link); }

/* Navigation */
.nav-container { background-color: var(--bg-primary); border-bottom: 1px solid var(--border); transition: background-color 0.4s ease, border-color 0.4s ease; }
.nav-link { position: relative; color: var(--text-secondary); transition: color 0.2s ease; padding-bottom: 2px; }
.nav-link.active { color: var(--text-primary); font-weight: 600; }
.nav-link::after { content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 1px; background-color: var(--accent); transition: width 0.3s ease; }
.nav-link:hover::after, .nav-link.active::after { width: 100%; }

/* Cards */

/* Buttons */

.btn-outline { border: 1px solid var(--border); color: var(--text-primary); padding: 0.5rem 1.5rem; font-size: 0.95rem; transition: all 0.2s ease; }

.latex-action-btn { background-color: transparent; border: 1px solid var(--border); color: var(--text-primary); padding: 0.25rem 0.75rem; font-family: 'Crimson Pro', serif; font-size: 0.9rem; cursor: pointer; transition: all 0.2s ease; }
.latex-action-btn:hover { background-color: var(--text-primary); color: var(--bg-primary); border-color: var(--text-primary); }

/* Search Input */

/* Modal */
.modal-overlay { position: fixed; inset: 0; background-color: rgba(0, 0, 0, 0.6); backdrop-filter: blur(2px); display: flex; align-items: center; justify-content: center; z-index: 100; opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease; }

.page.active { display: block; opacity: 1; transform: translateY(0); }

/* Markdown Content Styles */
/* We apply .markdown-content to containers that will hold parsed MD */
.markdown-content h1 { font-size: 1.75rem; font-weight: 600; margin-top: 2rem; margin-bottom: 1rem; padding-bottom: 0.3rem; border-bottom: 1px solid var(--border); }
.markdown-content h2 { font-size: 1.4rem; font-weight: 500; margin-top: 1.8rem; margin-bottom: 0.8rem; }
.markdown-content h3 { font-size: 1.2rem; font-weight: 500; margin-top: 1.5rem; margin-bottom: 0.6rem; }

.markdown-content ul, .markdown-content ol { margin-left: 2em; margin-bottom: 1em; }

.markdown-content code { font-family: 'JetBrains Mono', monospace; font-size: 0.85em; background-color: var(--bg-secondary); padding: 0.15em 0.4em; border-radius: 3px; }
.markdown-content pre { background-color: var(--bg-secondary); padding: 1rem; border-radius: 4px; overflow-x: auto; margin: 1.5rem 0; border: 1px solid var(--border); }
.markdown-content pre code { background: none; padding: 0; }

.markdown-content a:hover { border-bottom-color: var(--link); }
.markdown-content table { width: 100%; border-collapse: collapse; margin: 1.5rem 0; }
.markdown-content th, .markdown-content td { border: 1px solid var(--border); padding: 0.6rem 1rem; text-align: left; }
.markdown-content th { background-color: var(--bg-secondary); font-weight: 600; }
.markdown-content strong { font-weight: 600; }

/* Theme Toggle */
.theme-toggle { width: 44px; height: 24px; background-color: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; position: relative; cursor: pointer; transition: all 0.3s ease; }

.dark .theme-toggle::after { transform: translateX(20px); }

/* KaTeX */

/* Loading Spinner */

<script>
// --- CONFIG & STATE ---
const DATA_PATH = './data/';
let siteConfig = {};
let papersData = [];
let blogIndexData = [];

// --- MARKDOWN PARSER SETUP ---

// Custom function to parse Markdown while preserving LaTeX
function parseMarkdown(text) {
    if (!text) return "";
    
    // 1. Store Math Blocks to prevent Markdown parsing inside them
    let mathBlocks = [];
    
    // Extract display math ($$...$$)
    text = text.replace(/\$\$([\s\S]+?)\$\$/g, (match, p1) => {
        mathBlocks.push({ type: 'display', math: p1 });
        return `MATHBLOCK${mathBlocks.length - 1}ENDBLOCK`;
    });

    // Extract inline math ($...$)
    // We use a cautious regex to avoid matching currency like $5
    // Assumes math formulas contain letters, operators, or brackets
    text = text.replace(/\$([^\$\n]+?)\$/g, (match, p1) => {
        mathBlocks.push({ type: 'inline', math: p1 });
        return `MATHBLOCK${mathBlocks.length - 1}ENDBLOCK`;
    });

    // 2. Parse Markdown using marked
    // Set breaks: true to handle single line breaks as <br>
    let html = marked.parse(text, { breaks: true, gfm: true });

    // 3. Restore Math Blocks
    mathBlocks.forEach((block, index) => {
        const placeholder = `MATHBLOCK${index}ENDBLOCK`;
        if (block.type === 'display') {
            html = html.replace(placeholder, `$$${block.math}$$`);
        } else {
            html = html.replace(placeholder, `$${block.math}$`);
        }
    });

    return html;
}

// --- DATA LOADERS ---

async function loadConfig() {
  try {
    const res = await fetch(DATA_PATH + 'config.json');
    siteConfig = await res.json();
    document.getElementById('navTitle').innerText = siteConfig.title.split(' - ')[0];
    document.getElementById('homeTitle').innerText = siteConfig.title.split(' - ')[1] || siteConfig.title;
    document.getElementById('homeSubtitle').innerText = siteConfig.subtitle;
    document.getElementById('footerOrg').innerText = "主办：" + siteConfig.organization;
    document.getElementById('footerCopy').innerText = "© " + siteConfig.copyright + ". 保留所有权利.";
  } catch (e) {
    console.error("Failed to load config", e);
  }
}

async function loadAbout() {
  const container = document.getElementById('aboutContent');
  try {
    const res = await fetch(DATA_PATH + 'about.json');
    const data = await res.json();
    container.innerHTML = parseMarkdown(data.content);
    renderMath();
  } catch (e) {
    container.innerHTML = "<p class='text-center text-red-600'>加载简介失败</p>";
  }
}

async function loadNotices() {
  const container = document.getElementById('noticesList');
  const homeContainer = document.getElementById('homeNotices');
  try {
    const res = await fetch(DATA_PATH + 'notices.json');
    const data = await res.json();
    
    // Render Full List
    container.innerHTML = data.map(n => `
      <article class="paper-card rounded-lg p-5 cursor-pointer" onclick="showNoticeDetail('${n.id}', '${n.title}', '${n.date}')">
        <span class="text-xs font-mono" style="color: var(--accent);">${n.date}</span>
        <h3 class="text-lg font-medium mt-1 mb-2" style="color: var(--text-primary);">${n.title}</h3>
        <div class="text-sm" style="color: var(--text-secondary);">${parseMarkdown(n.summary)}</div>
      </article>
    `).join('');

    // Render Home Summary (Top 1)
    if (data.length > 0) {
       const latest = data[0];
       homeContainer.innerHTML = `
        <article class="paper-card rounded-lg p-5 cursor-pointer" onclick="navigateTo('notices')">
          <span class="text-xs font-mono" style="color: var(--accent);">${latest.date}</span>
          <h3 class="text-lg font-medium mt-1 mb-2" style="color: var(--text-primary);">${latest.title}</h3>
          <div class="text-sm" style="color: var(--text-secondary);">${parseMarkdown(latest.summary)}</div>
        </article>
       `;
    }
    renderMath();
  } catch (e) {
    container.innerHTML = "<p class='text-center text-red-600'>加载通知失败</p>";
    homeContainer.innerHTML = "";
  }
}

// Simple alert for notice detail since we don't have a dedicated detail page structure for notices in this design
function showNoticeDetail(id, title, date) {
    // Ideally, we might want a modal or a separate page, but for now, we can load the content dynamically.
    // Let's implement a simple modal alert or just log it.
    // For better UX, let's reuse the download modal structure or create a simple alert.
    alert(`查看通知详情：${title}\n\n请在此处加载完整 Markdown 内容。`);
    // In a real app, you would fetch the specific notice content and display it.
}

async function loadPapers() {
  const tbody = document.getElementById('papersTable');
  try {
    const res = await fetch(DATA_PATH + 'papers.json');
    papersData = await res.json();
    renderPapers(papersData);
  } catch (e) {
    tbody.innerHTML = "<tr><td colspan='4' class='text-center text-red-600 p-5'>加载试卷列表失败</td></tr>";
  }
}

async function loadBlogIndex() {
  const container = document.getElementById('blogList');
  try {
    const res = await fetch(DATA_PATH + 'blog/index.json');
    blogIndexData = await res.json();
    renderBlogList(blogIndexData);
  } catch (e) {
    container.innerHTML = "<p class='text-center text-red-600'>加载博客列表失败</p>";
  }
}

async function loadBlogPost(id) {
  const container = document.getElementById('blogDetailContent');
  container.innerHTML = "<div class='text-center p-10'><div class='loading-spinner'></div></div>";
  
  try {
    const meta = blogIndexData.find(p => p.id === id);
    const res = await fetch(`${DATA_PATH}blog/posts/${id}.json`);
    const data = await res.json();
    
    container.innerHTML = `
      <p style="text-indent: 0; font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 1rem;">
        <span class="font-mono">${meta ? meta.date : ''}</span> · 作者：${meta ? meta.author : '未知'}
      </p>
      ${parseMarkdown(data.content)}
    `;
    renderMath();
  } catch (e) {
    container.innerHTML = "<p class='text-center text-red-600'>加载文章内容失败</p>";
  }
}

// --- RENDER FUNCTIONS ---

function renderPapers(data) {
  const tbody = document.getElementById('papersTable');
  const noResult = document.getElementById('noPapersResult');
  
  if (data.length === 0) {
    tbody.innerHTML = '';
    noResult.classList.remove('hidden');
    return;
  }
  
  noResult.classList.add('hidden');
  tbody.innerHTML = data.map(paper => `
    <tr style="border-bottom: 1px solid var(--border);">
      <td class="py-3 px-4 font-mono">${paper.year}</td>
      <td class="py-3 px-4 space-x-2">
        <button class="latex-action-btn" onclick="openModal('${paper.year}年${paper.p.name}', '${paper.p.url}')">试卷</button>
        <button class="latex-action-btn" onclick="openModal('${paper.year}年${paper.pa.name}', '${paper.pa.url}')">答案</button>
      </td>
      <td class="py-3 px-4 space-x-2">
        <button class="latex-action-btn" onclick="openModal('${paper.year}年${paper.s.name}', '${paper.s.url}')">试卷</button>
        <button class="latex-action-btn" onclick="openModal('${paper.year}年${paper.sa.name}', '${paper.sa.url}')">答案</button>
      </td>
      <td class="py-3 px-4 space-x-2">
        <button class="latex-action-btn" onclick="openModal('${paper.year}年${paper.f.name}', '${paper.f.url}')">试卷</button>
        <button class="latex-action-btn" onclick="openModal('${paper.year}年${paper.fa.name}', '${paper.fa.url}')">答案</button>
      </td>
    </tr>
  `).join('');
}

function renderBlogList(data) {
  const container = document.getElementById('blogList');
  const noResult = document.getElementById('noBlogResult');
  
  if (data.length === 0) {
    container.innerHTML = '';
    noResult.classList.remove('hidden');
    return;
  }
  
  noResult.classList.add('hidden');
  container.innerHTML = data.map(post => `
    <article class="paper-card rounded-lg p-5 cursor-pointer" onclick="openBlogPost(${post.id})">
      <span class="text-xs font-mono" style="color: var(--accent);">${post.date}</span>
      <h3 class="text-lg font-medium mt-1 mb-2" style="color: var(--text-primary);">${post.title}</h3>
      <div class="text-sm" style="color: var(--text-secondary);">${parseMarkdown(post.summary)}</div>
    </article>
  `).join('');
  renderMath();
}

// --- ACTIONS ---

function navigateTo(pageId) {
  document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
  const targetPage = document.getElementById('page-' + pageId);
  if (targetPage) targetPage.classList.add('active');
  
  document.querySelectorAll('.nav-link').forEach(link => {
    link.classList.remove('active');
    if (link.getAttribute('data-page') === pageId) link.classList.add('active');
  });
  
  window.scrollTo(0, 0);
  
  if (pageId === 'about') loadAbout();
  if (pageId === 'notices') loadNotices();
  if (pageId === 'papers') loadPapers();
  if (pageId === 'blog') loadBlogIndex();
}

function filterPapers() {
  const searchText = document.getElementById('paperSearch').value;
  if (!papersData.length) return;
  const filtered = papersData.filter(p => p.year.includes(searchText));
  renderPapers(filtered);
}

function filterBlogs() {
  const searchText = document.getElementById('blogSearch').value.toLowerCase();
  if (!blogIndexData.length) return;
  const filtered = blogIndexData.filter(p => 
    p.title.toLowerCase().includes(searchText) || 
    p.summary.toLowerCase().includes(searchText)
  );
  renderBlogList(filtered);
}

function openBlogPost(id) {
  document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
  document.getElementById('page-blog-detail').classList.add('active');
  window.scrollTo(0, 0);
  loadBlogPost(id);
}

function backToBlogList() {
  navigateTo('blog');
}

// --- MODAL LOGIC ---
let currentDownloadUrl = '';

function openModal(name, url) {
  currentDownloadUrl = url;
  document.getElementById('modalResourceName').innerText = name;
  document.getElementById('modalUrlBox').innerText = url;
  document.getElementById('downloadModal').classList.add('active');
}

function closeModal() {
  document.getElementById('downloadModal').classList.remove('active');
}

function confirmDownload() {
  window.open(currentDownloadUrl, '_blank');
  closeModal();
}

// --- UTILS ---

function renderMath() {
  if (typeof renderMathInElement === 'function') {
    renderMathInElement(document.body, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false}
      ]
    });
  }
}

function toggleTheme() {
  document.documentElement.classList.toggle('dark');
  localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
}

function closeMobileMenu() {
  document.getElementById('mobileMenu').classList.remove('active');
}

// --- INITIALIZATION ---

document.addEventListener('DOMContentLoaded', () => {
  if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.documentElement.classList.add('dark');
  }
  
  document.getElementById('themeToggle').addEventListener('click', toggleTheme);
  document.getElementById('themeToggleMobile').addEventListener('click', toggleTheme);
  document.getElementById('mobileMenuBtn').addEventListener('click', () => document.getElementById('mobileMenu').classList.add('active'));
  document.getElementById('closeMobileMenu').addEventListener('click', closeMobileMenu);
  document.getElementById('downloadModal').addEventListener('click', (e) => {
    if (e.target.id === 'downloadModal') closeModal();
  });
  
  loadConfig();
  loadNotices(); 
});
</script>
</body>
</html>
